version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: quantum_postgres
    restart: always
    environment:
      POSTGRES_USER: quantum_user
      POSTGRES_PASSWORD: quantum_password
      POSTGRES_DB: quantum_ensemble
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: quantum_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
